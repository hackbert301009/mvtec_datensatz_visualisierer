datasets:
  mvtec_ad:
    name: "MVTec AD"
    root: /mnt/029A05BB9A05AC6B/data/mvtec_anomaly_detection
    type: mvtec_ad
  mvtec_ad2:
    name: "MVTec AD 2"
    root: /mnt/029A05BB9A05AC6B/data/mvtec_ad_2
    type: mvtec_ad2
  mvtec_ad3:
    name: "MVTec 3D AD"
    root: /mnt/029A05BB9A05AC6B/data
    type: mvtec_ad3

model:
  backbone: efficientnet_b0
  layers: [1, 2, 3]
  image_size: 224
  target_channels: 100
  epsilon: 0.01
  sigma: 4.0
  device: auto

training:
  batch_size: 32
  default_categories:
    - bottle
    - capsule

inference:
  threshold: 1.0
  overlay_alpha: 0.5

paths:
  checkpoints: checkpoints
  results: results

api:
  host: 0.0.0.0
  port: 8000
